    <style>
      body { font-family: 'Poppins', sans-serif; }
      .glass-nav {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
      }
      .blue-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      }
      .scroll-mt-nav {
        scroll-margin-top: 80px;
      }
      @keyframes marquee-instituicoes {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .marquee-instituicoes-track {
        display: flex;
        align-items: center;
        width: max-content;
        gap: 3rem;
        animation: marquee-instituicoes 45s linear infinite;
      }
      @media (min-width: 768px) {
        .marquee-instituicoes-track {
          gap: 5rem;
        }
      }
      .marquee-instituicoes-track:hover {
        animation-play-state: paused;
      }
      @media (prefers-reduced-motion: reduce) {
        .marquee-instituicoes-track {
          animation: none;
          flex-wrap: wrap;
          justify-content: center;
          width: 100%;
          max-width: 72rem;
          margin-left: auto;
          margin-right: auto;
        }
      }
    </style>
